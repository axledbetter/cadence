name: CI

on:
  push:
    # Master + tag pushes ALWAYS run the full CI (safety net for any path
    # filter on pull_request below — codex pass W4).
    branches: [master]
    tags: ['v*']
  # Manual trigger — used to re-run Publish to npm against an existing
  # tag if a transient failure (network blip, registry hiccup) killed the
  # original run. With OIDC trusted publishing there's no shared secret to
  # rotate; reruns work because the workflow gets a fresh OIDC token each
  # run. Dispatch with the tag as the ref (GitHub UI "Use workflow from"
  # dropdown supports tags). No inputs (would create a workflow-injection
  # surface).
  workflow_dispatch: {}
  pull_request:
    branches: [master]
    # v7.1.5 — change-aware CI matrix. Skip the CLI test job for PRs that
    # only touch apps/web/**, db/**, tests/rls/**, or docs/**.
    # Conservative path groups: any change to root package.json, lockfile,
    # tsconfig*, scripts/**, presets/**, OR this workflow file triggers
    # a full run.
    paths:
      - 'src/**'
      - 'bin/**'
      - 'tests/**'
      - 'scripts/**'
      - 'presets/**'
      - 'tsconfig*.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22']

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # v7.8.0 — AST audit blocks any static value-import of
      # `@supabase/supabase-js` outside the dashboard allowlist. supabase
      # is an optionalDependency; a regression here would break local-only
      # users who install with `npm install --omit=optional`. Run BEFORE
      # tests so a clear failure shows up first.
      - name: Audit supabase imports
        run: npm run audit:supabase

      - name: Test
        run: node scripts/test-runner.mjs

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    # Gated environment — npm trusted-publisher policy on npmjs.com binds
    # the OIDC identity to this exact environment name.
    environment: npm-publish
    permissions:
      contents: read
      id-token: write   # required for npm trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing requires npm CLI >= 11.5. Node 22's bundled npm
      # may be older; pin explicitly so OIDC isn't silently skipped.
      - name: Pin npm to a trusted-publishing-capable version
        run: |
          npm install -g npm@^11.5.0
          NPM_MAJOR=$(node -e "console.log(process.versions.npm.split('.').map(Number)[0])")
          if [ "$NPM_MAJOR" -lt 11 ]; then
            echo "npm $(npm --version) is too old for trusted publishing (need >=11.5.0)"
            exit 1
          fi
          npm --version

      - run: npm ci

      - name: Validate tag matches package version
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag ${{ github.ref_name }} does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish (OIDC + provenance)
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="$REF_NAME"
          # Strict semver tags (v1.2.3) → latest. Pre-release suffix → next.
          if [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then TAG="latest"; else TAG="next"; fi
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          EXISTING=$(npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null || echo "")
          if [ "$EXISTING" = "$PKG_VERSION" ]; then
            echo "Version $PKG_VERSION already published — skipping"
            exit 0
          fi
          # OIDC auth — no NODE_AUTH_TOKEN. npm CLI exchanges the GitHub
          # workflow's OIDC token for an npm publish credential at the
          # registry. Requires:
          #   - permissions.id-token: write (above)
          #   - npm trusted-publisher policy on npmjs.com bound to:
          #       owner: axledbetter, repo: cadence,
          #       workflow: .github/workflows/ci.yml,
          #       environment: npm-publish
          # --provenance attests the publish to the source commit + run.
          npm publish --access public --tag "$TAG" --provenance
