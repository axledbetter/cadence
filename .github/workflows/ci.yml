name: CI

on:
  push:
    # Master + tag pushes ALWAYS run the full CI (safety net for any path
    # filter on pull_request below — codex pass W4).
    branches: [master]
    tags: ['v*']
  # Manual trigger — used to re-run Publish to npm against an existing
  # tag with a freshly-rotated NPM_TOKEN. GitHub Actions reruns of a
  # completed workflow read the secret-state from the original run; only
  # a fresh workflow event picks up rotated secrets. Dispatch this
  # workflow with the tag selected as the ref (GitHub UI "Use workflow
  # from" dropdown supports tags) and the publish job reads github.ref_name
  # as the tag and proceeds normally. No inputs needed — using inputs
  # would create a potential workflow injection surface.
  workflow_dispatch: {}
  pull_request:
    branches: [master]
    # v7.1.5 — change-aware CI matrix. Skip the CLI test job for PRs that
    # only touch apps/web/**, db/**, tests/rls/**, or docs/**.
    # Conservative path groups: any change to root package.json, lockfile,
    # tsconfig*, scripts/**, presets/**, OR this workflow file triggers
    # a full run.
    paths:
      - 'src/**'
      - 'bin/**'
      - 'tests/**'
      - 'scripts/**'
      - 'presets/**'
      - 'tsconfig*.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22']

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # v7.8.0 — AST audit blocks any static value-import of
      # `@supabase/supabase-js` outside the dashboard allowlist. supabase
      # is an optionalDependency; a regression here would break local-only
      # users who install with `npm install --omit=optional`. Run BEFORE
      # tests so a clear failure shows up first.
      - name: Audit supabase imports
        run: npm run audit:supabase

      - name: Test
        run: node scripts/test-runner.mjs

  # The `publish:` job was removed in the changesets-release-automation
  # PR. Changesets owns publish now — see .github/workflows/release.yml
  # and RELEASING.md. Tag pushes are still allowed (the `on: push tags`
  # trigger above stays) for posterity / future tooling, but no longer
  # trigger an npm publish on their own.
